<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="frame">
      <section class="scoreBoard">
        <div class="scoreDiv">
          <span class="scoreTitle">High Score:</span>
          <span class="scoreInfo highScore">00</span>
        </div>
        <div class="scoreDiv">
          <span class="scoreTitle">Score:</span>
          <span class="scoreInfo score">00</span>
        </div>
        <div class="scoreDiv">
          <span class="scoreTitle">Time:</span>
          <span class="scoreInfo time">1-23</span>
        </div>
      </section>
      <section class="gridBoard"></section>

      <section class="model">
        <h1 class="modelHeading">Welcome to the Snake Game</h1>
        <div class="scoreShow">
            <div>High Score:- <span class="hightScoreUser">00</span></div>
            <div>Score:- <span class="scoreUser">00</span></div>
        </div>
        <button class="btn startButton">Start Game</button>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
